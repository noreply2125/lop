		<style>
			/* CONTAINER */
			/* "display: flex" DIV STYLE */
			/* BUG : flex does not allow to give height and margin, use "position: absolute" DIV STYLE */
			.flex-container-flex {
				/* stretch and center */
				position: absolute;
				left: 2%;
				right: 2%;
				top: 2%;
				bottom: 2%;

				display: flex;
				flex-wrap: wrap;

				padding-top: 2%; /* flex system distributes vertical empty areas equally itself, margins corrupted */

				border-radius: 1vmin;
				background-color: white;

				div {
					/* portrait */
					flex: 0 0 96%; /* width */
					height: 10%; /* flex system distributes vertical empty areas equally itself, margins corrupted */
					/* landscape */
					flex: 0 0 47%; /* width */
					height: 16%; /* look at projectSubMenus() */

					margin-left: 2%;

					border-radius: 1vmin;
					background-color: white;
					box-shadow: 1vmin 1vmin 1.5vmin rgba(0, 0, 0, 0.5);

					display: flex;
					flex-wrap: wrap;

					/* most inner divs which contain atomic html elements */
					div {
						flex: auto;
						margin: 0;
						box-shadow: none;

						/* center elements */
						display: flex;
						justify-content: center; /* horizontal */
						align-items: center; /* vertical */
					}
				}
			}

			/* CONTAINER */
			/* "position: absolute" DIV STYLE */
			div.abs-container-primary {
				/* white */
				/* stretch and center */
				position: absolute;
				left: 2%;
				right: 2%;
				top: 2%;
				bottom: 2%;

				border-radius: 1vmin; /* do not use %, if not 50%, it corrupts corners */
				background-color: white;
			}
			div.abs-container-secondary {
				/* lime */
				position: absolute;
				/* look at projectSubMenus() */
				width: 0%;
				height: 0%;
				left: 0%;
				top: 0%;

				border-radius: 1vmin;
				xbackground-color: lime;
			}
			div.abs-container-last {
				/* yellow */
				position: absolute;
				width: 96%;
				height: 22.5%;
				left: 2%;
				top: 0%; /* calculate in html */

				box-shadow: 1vmin 1vmin 1vmin rgba(0, 0, 0, 0.1);
				border-radius: 1vmin;
				xbackground-color: yellow;
			}
			.abs-container-atomic {
				/* atomic */
				/* most inner divs which contain atomic html elements */
				position: absolute;
				margin-left: 0%;
				margin-right: 0%;

				/* center elements */
				display: flex;
				justify-content: center; /* horizontal */
				align-items: center; /* vertical */

				border-radius: 1vmin;
			}
			.no-shadow {
				box-shadow: none;
			}

			/* CHECKBOX STYLE */
			span.lop-checkbox input[type='checkbox'] {
				visibility: hidden;
				display: none;
				cursor: pointer;
			}
			span.lop-checkbox *,
			span.lop-checkbox ::after,
			span.lop-checkbox ::before {
				box-sizing: border-box;
			}
			span.lop-checkbox .rocker {
				position: relative;
				width: 20vmin;
				height: 11.43vmin;
				border-bottom: 1.43vmin solid #eee;
				font-size: 5.71vmin;
				font-weight: bold;
				text-align: center;
				text-transform: uppercase;
				display: inline-block;
				color: #888;
				overflow: hidden;
			}
			span.lop-checkbox .rocker-small {
				font-size: 2.14vmin;
			}
			span.lop-checkbox .rocker::before {
				position: absolute;
				left: 0;
				right: 0;
				top: 1.43vmin;
				bottom: 0;
				border: 1.43vmin solid #eee;
				border-bottom: 0;
				content: '';
				background-color: #999;
			}
			span.lop-checkbox .switch-left,
			span.lop-checkbox .switch-right {
				position: absolute;
				width: 8.57vmin;
				height: 7.14vmin;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: 0s; /* BUG : also delays its disappearence on form close */
				user-select: none;
				cursor: pointer;
			}
			span.lop-checkbox .switch-left {
				width: 7.86vmin;
				height: 6.86vmin;
				left: 2.43vmin;
				bottom: 1.14vmin;
				transform: rotate(15deg) skewX(15deg);
				background-color: #ddd;
			}
			span.lop-checkbox .switch-right {
				right: 1.43vmin;
				bottom: 0;
				color: white;
				background-color: darkmagenta;
			}
			span.lop-checkbox .switch-left::before,
			span.lop-checkbox .switch-right::before {
				position: absolute;
				width: 1.14vmin;
				height: 7vmin;
				bottom: -1.29vmin;
				transform: skewY(-65deg);
				content: '';
				background-color: #ccc;
			}
			span.lop-checkbox .switch-left::before {
				left: -1.14vmin;
			}
			span.lop-checkbox .switch-right::before {
				right: -1.07vmin;
				transform: skewY(65deg);
				background-color: transparent;
			}
			span.lop-checkbox input:checked + .switch-left {
				width: 8.57vmin;
				height: 7.14vmin;
				left: 1.43vmin;
				bottom: 0vmin;
				transform: rotate(0deg) skewX(0deg);
				color: white;
				background-color: magenta;
			}
			span.lop-checkbox input:checked + .switch-left::before {
				width: 8.81vmin;
				background-color: transparent;
			}
			span.lop-checkbox input:checked + .switch-left + .switch-right {
				width: 7.86vmin;
				height: 6.86vmin;
				right: 2.29vmin;
				bottom: 1.14vmin;
				transform: rotate(-15deg) skewX(-15deg);
				color: #888;
				background-color: #ddd;
			}
			span.lop-checkbox input:checked + .switch-left + .switch-right::before {
				background-color: #ccc;
			}
			/* Keyboard Users */
			span.lop-checkbox input:focus + .switch-left {
				color: #333;
			}
			span.lop-checkbox input:checked:focus + .switch-left {
				color: white;
			}
			span.lop-checkbox input:focus + .switch-left + .switch-right {
				color: white;
			}
			span.lop-checkbox input:checked:focus + .switch-left + .switch-right {
				color: #333;
			}

			/* SELECT STYLE */
			select.lop-select {
				position: absolute;
				width: 100%;
				padding: 5%;
				border: 1px solid silver;
				xborder-radius: 1vmin;
				xappearance: none; /* remove default arrow */
				outline: 0;
				font-size: 3.5vmin;
				cursor: pointer;
				color: magenta;
				background-color: white;
			}
			select.lop-select::-ms-expand {
				/* remove IE arrow */
				display: none;
			}

			/* NEWSPAPER JUSTIFY */
			.newspaper {
				position: absolute;
				width: 100%;
				height: 100%;
				font-size: 3vmin;
				text-align: justify;
				overflow: hidden;
				color: black;
				xbackground-color: red;
			}
			.newspaper:after {
				width: 100%;
				height: 100%;
				display: inline-block;
				content: '';
			}

			/* LEVELUP FORM STYLE */
			#menu_levelup_form div.abs-container-last {
				font-size: 3vmin; /* smaller */
				text-align: center;
			}
			.current-goldxp {
				font-size: 4vmin;
				color: magenta;
			}
			.target-xp {
				font-size: 8vmin;
				color: grey;
			}
			.num-circle {
				font-size: 8vmin;
				text-align: center;
				float: left;
				border-radius: 50%;
				color: white;
				background-color: magenta;
				box-sizing: border-box;
				z-index: 9;
			}
			/* ISSUE : even if .target-lvl class is after .num-circle class in html, does not matter, css system looks the order here, below color suppress above color */
			.target-lvl {
				font-size: 8vmin;
				transition: transform 0.5s ease; /* look at levelupAnimation() */
				cursor: pointer;
			}
			.current-progress {
				position: absolute;
				left: 0;
				width: 75%; /* calculate */
				height: 100%;
				background-color: magenta;
			}
			.needed-progress {
				position: absolute;
				right: 0;
				width: 25%; /* calculate */
				height: 100%;
				background-color: #e0e0e0;
			}

			/* TOOLTIP STYLE */
			.tooltip {
				position: absolute;
				left: 0;
				bottom: 0;
				text-align: center;
				color: magenta;
				visibility: hidden;
			}

			/* ACTIVE BONUS STYLE */
			.active-bonus {
				position: absolute;
				right: 0vmin;
				top: 0vmin;
				width: 27vmin; /* do not zero, we must init (css issue), 3 letter wide, same as projectSubMenus() */
				xheight: 9vmin;
				font-size: 8vmin;
				letter-spacing: 0.5vmin;
				text-align: right;
				overflow-wrap: break-word;
				font-style: normal;
				color: grey; /* white/grey */
				xbackground-color: black;
				visibility: hidden;
			}

			/* GAME STAT STYLE */
			.game-stat {
				position: absolute;
				right: 0vmin;
				bottom: 0vmin;
				width: 18vmin;
				height: 12vmin; /* same as projectSubMenus() */
				font-size: 2.5vmin;
				text-align: right;
				xbackground-color: white;
				visibility: hidden;
			}

			/* BONUS STYLE */
			.bonus {
				position: absolute;
				width: 100%;

				/* center both horizontal and vertical */
				height: 100%;
				display: flex;
				align-items: center;
				justify-content: center;

				font-size: 10vmin;
				color: magenta;
				xbackground-color: white;
				visibility: hidden;
			}

			/* CANVAS STYLE */
			.canvas {
				width: 100%;
				height: 100%;
				touch-action: none;
			}
		</style>
